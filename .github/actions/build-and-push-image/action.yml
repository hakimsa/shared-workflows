name: 'Build and Push Docker Image'
description: 'Build and push Docker image to registry (Docker Hub, GHCR, ACR, etc.)'

inputs:
  # Image Configuration
  image-name:
    required: true
    description: 'Docker image name (e.g., myapp, org/myapp)'
  
  dockerfile-path:
    required: false
    default: 'Dockerfile'
    description: 'Path to Dockerfile'
  
  context:
    required: false
    default: '.'
    description: 'Build context directory'
  
  tags:
    required: false
    default: ''
    description: 'Comma-separated list of tags (e.g., latest,v1.0.0)'
  
  # Build Arguments
  build-args:
    required: false
    default: ''
    description: 'Newline-separated build arguments (e.g., NODE_ENV=production\nBUILD_VERSION=1.0)'
  
  # Registry Configuration
  registry:
    required: false
    default: 'docker'
    description: 'Registry type: docker (Docker Hub), ghcr (GitHub Container Registry), acr (Azure)'
  
  registry-username:
    required: false
    default: ''
    description: 'Registry username/login'
  
  registry-password:
    required: false
    default: ''
    description: 'Registry password/token'
  
  registry-url:
    required: false
    default: ''
    description: 'Custom registry URL (for private registries)'
  
  # Push Configuration
  push:
    required: false
    default: 'true'
    description: 'Whether to push the image after building'
  
  environment:
    required: false
    default: 'dev'
    description: 'Environment (dev, staging, production)'
  
  # Platforms (for multi-arch builds)
  platforms:
    required: false
    default: 'linux/amd64'
    description: 'Comma-separated list of platforms (e.g., linux/amd64,linux/arm64)'

outputs:
  image-digest:
    description: 'Docker image digest'
    value: ${{ steps.build.outputs.digest }}
  
  image-url:
    description: 'Full image URL with tag'
    value: ${{ steps.image-url.outputs.url }}

runs:
  using: 'composite'
  steps:
    # ── Setup QEMU for multi-platform builds ──
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      if: ${{ inputs.platforms != 'linux/amd64' }}

    # ── Setup Docker Buildx ──
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # ── Login to Docker Hub ──
    - name: Login to Docker Hub
      if: ${{ inputs.registry == 'docker' && inputs.registry-username != '' }}
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    # ── Login to GitHub Container Registry ──
    - name: Login to GHCR
      if: ${{ inputs.registry == 'ghcr' }}
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    # ── Login to Azure Container Registry ──
    - name: Login to ACR
      if: ${{ inputs.registry == 'acr' && inputs.registry-url != '' }}
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry-url }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    # ── Login to Custom Registry ──
    - name: Login to Custom Registry
      if: ${{ inputs.registry == 'custom' && inputs.registry-url != '' }}
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry-url }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    # ── Prepare Image Tags ──
    - name: Prepare tags and labels
      id: meta
      shell: bash
      run: |
        IMAGE_NAME="${{ inputs.image-name }}"
        REGISTRY="${{ inputs.registry }}"
        
        # Determine registry prefix
        case "$REGISTRY" in
          docker)
            PREFIX=""
            ;;
          ghcr)
            PREFIX="ghcr.io/"
            ;;
          acr)
            PREFIX="${{ inputs.registry-url }}/"
            ;;
          custom)
            PREFIX="${{ inputs.registry-url }}/"
            ;;
          *)
            PREFIX=""
            ;;
        esac
        
        # Build tags
        TAGS=""
        if [ -z "${{ inputs.tags }}" ]; then
          # Default tags if none provided
          TAGS="${PREFIX}${IMAGE_NAME}:${{ github.sha }}"
          if [ "${{ inputs.environment }}" != "dev" ]; then
            TAGS="${TAGS},${PREFIX}${IMAGE_NAME}:${{ inputs.environment }}"
          fi
          TAGS="${TAGS},${PREFIX}${IMAGE_NAME}:latest"
        else
          # Use provided tags
          IFS=',' read -ra TAGS_ARRAY <<< "${{ inputs.tags }}"
          for tag in "${TAGS_ARRAY[@]}"; do
            if [ -z "$TAGS" ]; then
              TAGS="${PREFIX}${IMAGE_NAME}:${tag}"
            else
              TAGS="${TAGS},${PREFIX}${IMAGE_NAME}:${tag}"
            fi
          done
        fi
        
        echo "tags=${TAGS}" >> $GITHUB_OUTPUT
        echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
        echo "prefix=${PREFIX}" >> $GITHUB_OUTPUT

    # ── Build and Push Image ──
    - name: Build and push
      id: build
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile-path }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # ── Output Image URL ──
    - name: Set image URL
      id: image-url
      shell: bash
      run: |
        FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | cut -d',' -f1)
        echo "url=${FIRST_TAG}" >> $GITHUB_OUTPUT

    # ── Generate Summary ──
    - name: Generate summary
      shell: bash
      run: |
        echo "## 🐳 Docker Image Built" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Image:** \`${{ steps.image-url.outputs.url }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
        echo "**Push:** ${{ inputs.push }}" >> $GITHUB_STEP_SUMMARY
