name: Reusable CI - Generic

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: '.'
      run-tests:
        required: false
        type: boolean
        default: true
      install-command:
        required: true
        type: string
      lint-command:
        required: false
        type: string
        default: ''
      test-command:
        required: false
        type: string
        default: ''
      build-command:
        required: false
        type: string
        default: ''
      artifact-path:
        required: false
        type: string
        default: 'dist/'
      setup-node:
        required: false
        type: boolean
        default: false
      node-version:
        required: false
        type: string
        default: '20'
      setup-python:
        required: false
        type: boolean
        default: false
      python-version:
        required: false
        type: string
        default: '3.12'
      setup-java:
        required: false
        type: boolean
        default: false
      java-version:
        required: false
        type: string
        default: '21'
    secrets:
      PACKAGE_TOKEN:
        required: false
    outputs:
      artifact-name:
        description: "Nombre del artefacto generado"
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:

  lint:
    runs-on: ubuntu-latest
    if: ${{ inputs.lint-command != '' }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ inputs.setup-node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Setup Python
        if: ${{ inputs.setup-python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Setup Java
        if: ${{ inputs.setup-java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: ${{ inputs.install-command }}
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Run lint
        run: ${{ inputs.lint-command }}

  test:
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ inputs.run-tests && inputs.test-command != '' && inputs.lint-command != '' }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ inputs.setup-node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Setup Python
        if: ${{ inputs.setup-python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Setup Java
        if: ${{ inputs.setup-java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: ${{ inputs.install-command }}
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Run tests
        run: ${{ inputs.test-command }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build:
    runs-on: ubuntu-latest
    needs: [lint, test] 
    if: ${{ !failure() && !cancelled() && inputs.build-command != '' }}
    outputs:
      artifact-name: ${{ steps.set-output.outputs.artifact-name }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ inputs.setup-node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Setup Python
        if: ${{ inputs.setup-python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Setup Java
        if: ${{ inputs.setup-java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: ${{ inputs.install-command }}
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Set artifact name
        id: set-output
        run: echo "artifact-name=build-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: ${{ inputs.working-directory }}/${{ inputs.artifact-path }}
          retention-days: 7