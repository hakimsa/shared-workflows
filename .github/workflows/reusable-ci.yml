name: Reusable CI - Generic
#pipeline de integración continua genérica que se puede reutilizar en diferentes proyectos. Permite configurar comandos de instalación, linting, testing y build, así como la configuración de entornos de desarrollo para Node.js, Python y Java. Además, maneja la generación y carga de artefactos de build y reportes de cobertura.
on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: '.'
      run-tests:
        required: false
        type: boolean
        default: true
      install-command:
        required: true
        type: string
      lint-command:
        required: false
        type: string
        default: ''
      test-command:
        required: false
        type: string
        default: ''
      build-command:
        required: false
        type: string
        default: ''
      artifact-path:
        required: false
        type: string
        default: 'dist/'
      setup-node:
        required: false
        type: boolean
        default: false
      node-version:
        required: false
        type: string
        default: '20'
      setup-python:
        required: false
        type: boolean
        default: false
      python-version:
        required: false
        type: string
        default: '3.12'
      setup-java:
        required: false
        type: boolean
        default: false
      java-version:
        required: false
        type: string
        default: '21'
    secrets:
      PACKAGE_TOKEN:
        required: false
    outputs:
      artifact-name:
        description: "Nombre del artefacto generado"
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
#chequeo de código con linters, se ejecuta solo si lint-command no está vacío. Además, se asegura de que se haya configurado al menos un entorno de desarrollo (Node.js, Python o Java) para evitar ejecutar linters sin un entorno adecuado.
  lint:
    runs-on: ubuntu-latest
    if: ${{ inputs.lint-command != '' }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ inputs.setup-node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Setup Python
        if: ${{ inputs.setup-python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Setup Java
        if: ${{ inputs.setup-java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: ${{ inputs.install-command }}
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Run lint
        run: ${{ inputs.lint-command }}
# test unitarios, de integración o end-to-end dependiendo del comando configurado en test-command. Solo se ejecuta si run-tests es true y test-command no está vacío. Además, se asegura de que lint-command no esté vacío para evitar ejecutar tests si no se ha configurado un comando de linting.
  test:
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ inputs.run-tests && inputs.test-command != '' && inputs.lint-command != '' }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
#setup de nodejs
      - name: Setup Node.js
        if: ${{ inputs.setup-node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
#setup de python
      - name: Setup Python
        if: ${{ inputs.setup-python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'
#setup de java
      - name: Setup Java
        if: ${{ inputs.setup-java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: ${{ inputs.install-command }}
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Run tests
        run: ${{ inputs.test-command }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
#build images and deploy to kubernetes cluster
  build:
    runs-on: ubuntu-latest
    needs: [lint, test] 
    if: ${{ !failure() && !cancelled() && inputs.build-command != '' }}
    outputs:
      artifact-name: ${{ steps.set-output.outputs.artifact-name }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
#step para configurar Node.js, se ejecuta solo si setup-node es true. Utiliza la acción oficial de setup-node para configurar la versión de Node.js especificada en node-version y habilitar el cache de npm para acelerar la instalación de dependencias en futuras ejecuciones.
      - name: Setup Node.js
        if: ${{ inputs.setup-node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
#step para configurar Python, se ejecuta solo si setup-python es true. Utiliza la acción oficial de setup-python para configurar la versión de Python especificada en python-version y habilitar el cache de pip para acelerar la instalación de dependencias en futuras ejecuciones.
      - name: Setup Python
        if: ${{ inputs.setup-python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'
#step para configurar Java, se ejecuta solo si setup-java es true. Utiliza la acción oficial de setup-java para configurar la versión de Java especificada en java-version, utilizando la distribución Temurin y habilitando el cache de Maven para acelerar la construcción del proyecto en futuras ejecuciones.
      - name: Setup Java
        if: ${{ inputs.setup-java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: ${{ inputs.install-command }}
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
#build artifact, se ejecuta solo si build-command no está vacío. Además, se asegura de que los pasos de linting y testing hayan sido exitosos antes de ejecutar el comando de build para evitar construir artefactos si hay errores en el código o en los tests.
      - name: Build
        run: ${{ inputs.build-command }}

      - name: Set artifact name
        id: set-output
        run: echo "artifact-name=build-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: ${{ inputs.working-directory }}/${{ inputs.artifact-path }}
          retention-days: 7