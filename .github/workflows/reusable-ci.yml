name: Reusable CI - Generic

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: '.'
      environment:
        required: false
        type: string
        default: 'dev'
      run-tests:
        required: false
        type: boolean
        default: true
      install-command:
        required: true
        type: string
      lint-command:
        required: false
        type: string
        default: ''
      test-command:
        required: false
        type: string
        default: ''
      build-command:
        required: false
        type: string
        default: ''
      artifact-path:
        required: false
        type: string
        default: 'dist/'
      setup-node:
        required: false
        type: boolean
        default: false
      node-version:
        required: false
        type: string
        default: '20'
      setup-python:
        required: false
        type: boolean
        default: false
      python-version:
        required: false
        type: string
        default: '3.12'
      setup-java:
        required: false
        type: boolean
        default: false
      java-version:
        required: false
        type: string
        default: '21'
      docker-image-name:
        required: false
        type: string
        default: ''
      dockerfile-path:
        required: false
        type: string
        default: 'Dockerfile'
      image-tag:
        required: false
        type: string
        default: ''

    secrets:
      KUBE_CONFIG:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      PACKAGE_TOKEN:
        required: false
      SONAR_TOKEN:
        required: false

    outputs:
      artifact-name:
        description: "Nombre del artefacto generado"
        value: ${{ jobs.build-and-push.outputs.artifact-name }}


jobs:

  # ── 1. LINT ──────────────────────────────────────────────
  check-with-lint:
    runs-on: ubuntu-latest
    if: ${{ inputs.lint-command != '' }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ inputs.setup-node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Setup Python
        if: ${{ inputs.setup-python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Setup Java
        if: ${{ inputs.setup-java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: ${{ inputs.install-command }}
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Run lint
        run: ${{ inputs.lint-command }}


  # ── 2. BUILD + TESTS ─────────────────────────────────────
  test-and-coverage:
    runs-on: ubuntu-latest
    needs: check-with-lint
    if: ${{ !failure() && !cancelled() && inputs.run-tests && inputs.test-command != '' }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ inputs.setup-node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Setup Python
        if: ${{ inputs.setup-python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Setup Java
        if: ${{ inputs.setup-java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: ${{ inputs.install-command }}
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Run tests
        run: ${{ inputs.test-command }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/


  # ── 3. SONAR ─────────────────────────────────────────────
  check-with-sonar:
    runs-on: ubuntu-latest
    needs: test-and-coverage
    if: ${{ !failure() && !cancelled() }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        if: ${{ inputs.setup-java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: ${{ inputs.install-command }}
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Build and test for Sonar
        if: ${{ inputs.setup-java }}
        run: mvn clean verify

      - name: SonarCloud analysis
        if: ${{ inputs.setup-java }}
        run: |
          mvn verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=hakimsa_bakend-mgt
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=hakimsa-1
            -Dsonar.Token=${{ secrets.SONAR_TOKEN }}
      
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  # ── 4. BUILD IMAGE DOCKER + PUSH ─────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: [check-with-lint, test-and-coverage, check-with-sonar]
    if: ${{ !failure() && !cancelled() && inputs.build-command != '' }}
    outputs:
      artifact-name: ${{ steps.set-output.outputs.artifact-name }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ inputs.setup-node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Setup Python
        if: ${{ inputs.setup-python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Setup Java
        if: ${{ inputs.setup-java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: ${{ inputs.install-command }}
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Set artifact name
        id: set-output
        run: echo "artifact-name=build-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: ${{ inputs.working-directory }}/${{ inputs.artifact-path }}
          retention-days: 7

      - name: Set image tag
        id: set-tag
        if: ${{ inputs.docker-image-name != '' }}
        run: |
          if [ "${{ inputs.environment }}" == "production" ]; then
            if [ -z "${{ inputs.image-tag }}" ]; then
              echo "ERROR: image-tag is required for production"
              exit 1
            fi
            echo "tag=${{ inputs.image-tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        if: ${{ inputs.docker-image-name != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        if: ${{ inputs.docker-image-name != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.working-directory }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:${{ steps.set-tag.outputs.tag }}