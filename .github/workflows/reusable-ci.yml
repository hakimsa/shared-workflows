name: Reusable CI - Generic

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: '.'
      environment:
        required: false
        type: string
        default: 'dev'
      run-tests:
        required: false
        type: boolean
        default: true
      install-command:
        required: true
        type: string
      lint-command:
        required: false
        type: string
        default: ''
      test-command:
        required: false
        type: string
        default: ''
      build-command:
        required: false
        type: string
        default: ''
      artifact-path:
        required: false
        type: string
        default: 'dist/'
      setup-node:
        required: false
        type: boolean
        default: false
      node-version:
        required: false
        type: string
        default: '20'
      setup-python:
        required: false
        type: boolean
        default: false
      python-version:
        required: false
        type: string
        default: '3.12'
      setup-java:
        required: false
        type: boolean
        default: false
      java-version:
        required: false
        type: string
        default: '21'
      docker-image-name:
        required: false
        type: string
        default: ''
      dockerfile-path:
        required: false
        type: string
        default: 'Dockerfile'
      image-tag:
        required: false
        type: string
        default: ''
      docker-registry:
        required: false
        type: string
        default: 'docker'
        description: 'Registry type: docker (Docker Hub), ghcr (GitHub Container Registry), acr (Azure), custom'
      docker-build-args:
        required: false
        type: string
        default: ''
        description: 'Docker build arguments (newline-separated)'
      docker-platforms:
        required: false
        type: string
        default: 'linux/amd64'
        description: 'Docker build platforms (comma-separated)'
      docker-registry-url:
        required: false
        type: string
        default: ''
        description: 'Custom registry URL (required for acr and custom)'

    secrets:
      KUBE_CONFIG:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      PACKAGE_TOKEN:
        required: false
      SONAR_TOKEN:
        required: false
      ACR_USERNAME:
        required: false
      ACR_PASSWORD:
        required: false

    outputs:
      artifact-name:
        description: "Nombre del artefacto generado"
        value: ${{ jobs.build-and-push.outputs.artifact-name }}
      image-digest:
        description: "Digest de la imagen Docker"
        value: ${{ jobs.build-docker-image.outputs.image-digest }}
      image-url:
        description: "URL completa de la imagen Docker"
        value: ${{ jobs.build-docker-image.outputs.image-url }}


jobs:

  # ── 1. LINT ──────────────────────────────────────────────
  check-with-lint:
    runs-on: ubuntu-latest
    if: ${{ inputs.lint-command != '' }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ inputs.setup-node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Setup Python
        if: ${{ inputs.setup-python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Setup Java
        if: ${{ inputs.setup-java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: ${{ inputs.install-command }}
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Run lint
        run: ${{ inputs.lint-command }}


  # ── 2. BUILD + TESTS ─────────────────────────────────────
  test-and-coverage:
    runs-on: ubuntu-latest
    needs: check-with-lint
    if: ${{ !failure() && !cancelled() && inputs.run-tests && inputs.test-command != '' }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ inputs.setup-node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Setup Python
        if: ${{ inputs.setup-python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Setup Java
        if: ${{ inputs.setup-java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: ${{ inputs.install-command }}
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Run tests
        run: ${{ inputs.test-command }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/


  # ── 3. checks linter and sonar ─────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    needs: test-and-coverage
    if: ${{ !failure() && !cancelled() && inputs.lint-command != ''  }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        if: ${{ inputs.setup-java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: ${{ inputs.install-command }}
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Build and test for Sonar
        if: ${{ inputs.setup-java }}
        run: mvn clean verify
      - name: Debug Sonar token
        run: |
         echo "Token empty: ${{ secrets.SONAR_TOKEN == '' }}"
         echo "Token length: ${#SONAR_TOKEN}"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Run checks
        if: ${{ inputs.setup-java }}
        uses: hakimsa/shared-workflows/.github/actions/check@main
        with:
          working-directory: ${{ inputs.working-directory }}
          install-command:   ${{ inputs.install-command }}
          lint-command:      ${{ inputs.lint-command }}
          setup-node:        ${{ inputs.setup-node }}
          node-version:      ${{ inputs.node-version }}
          setup-python:      ${{ inputs.setup-python }}
          python-version:    ${{ inputs.python-version }}
          setup-java:        ${{ inputs.setup-java }}
          java-version:      ${{ inputs.java-version }}
          package-token:     ${{ secrets.PACKAGE_TOKEN }}
          sonar-token:       ${{ secrets.SONAR_TOKEN }}


  # ── 4. BUILD IMAGE DOCKER + PUSH ─────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: [check-with-lint, test-and-coverage, check]
    if: ${{ !failure() && !cancelled() && inputs.build-command != '' }}
    outputs:
      artifact-name: ${{ steps.build.outputs.artifact-name }}
    steps:
      - uses: actions/checkout@v4

      - name: Build application
        id: build
        uses: hakimsa/shared-workflows/.github/actions/build@main
        with:
          working-directory: ${{ inputs.working-directory }}
          build-command: ${{ inputs.build-command }}
          install-command: ${{ inputs.install-command }}
          artifact-path: ${{ inputs.artifact-path }}
          setup-node: ${{ inputs.setup-node }}
          node-version: ${{ inputs.node-version }}
          setup-python: ${{ inputs.setup-python }}
          python-version: ${{ inputs.python-version }}
          setup-java: ${{ inputs.setup-java }}
          java-version: ${{ inputs.java-version }}
          package-token: ${{ secrets.PACKAGE_TOKEN }}


  # ── 5. BUILD AND PUSH DOCKER IMAGE (USING REUSABLE ACTION) ──────────────
  build-docker-image:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ !failure() && !cancelled() && inputs.docker-image-name != '' }}
    outputs:
      image-digest: ${{ steps.image-build.outputs.image-digest }}
      image-url: ${{ steps.image-build.outputs.image-url }}
    env:
      DOCKER_REGISTRY: ${{ inputs.docker-registry }}
      DOCKER_IMAGE_NAME: ${{ inputs.docker-image-name }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare credentials
        id: creds
        run: |
          case "${{ env.DOCKER_REGISTRY }}" in
            docker)
              echo "registry_username=${{ secrets.DOCKERHUB_USERNAME }}" >> $GITHUB_OUTPUT
              echo "registry_password=${{ secrets.DOCKERHUB_TOKEN }}" >> $GITHUB_OUTPUT
              ;;
            ghcr)
              echo "registry_username=${{ github.actor }}" >> $GITHUB_OUTPUT
              echo "registry_password=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_OUTPUT
              ;;
            acr)
              echo "registry_username=${{ secrets.ACR_USERNAME }}" >> $GITHUB_OUTPUT
              echo "registry_password=${{ secrets.ACR_PASSWORD }}" >> $GITHUB_OUTPUT
              ;;
            custom)
              echo "registry_username=${{ secrets.ACR_USERNAME }}" >> $GITHUB_OUTPUT
              echo "registry_password=${{ secrets.ACR_PASSWORD }}" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Build and Push Docker Image
        id: image-build
        uses: hakimsa/shared-workflows/.github/actions/build-and-push-image@main
        with:
          image-name: ${{ inputs.docker-image-name }}
          dockerfile-path: ${{ inputs.dockerfile-path }}
          context: ${{ inputs.working-directory }}
          registry: ${{ inputs.docker-registry }}
          registry-username: ${{ steps.creds.outputs.registry_username }}
          registry-password: ${{ steps.creds.outputs.registry_password }}
          registry-url: ${{ inputs.docker-registry-url }}
          tags: ${{ inputs.image-tag != '' && inputs.image-tag || github.sha }}
          build-args: ${{ inputs.docker-build-args }}
          platforms: ${{ inputs.docker-platforms }}
          environment: ${{ inputs.environment }}
          push: 'true'