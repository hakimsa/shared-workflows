name: Reusable Deploy - Kubernetes

on:
  workflow_call:
    inputs:

      # ── Entorno ────────────────────────────────────────────
      environment:
        required: true
        type: string
        # valores esperados: development | staging | production

      # ── Imagen Docker ──────────────────────────────────────
      image-name:
        required: true
        type: string
        # ejemplo: ghcr.io/hakimsa/mi-app

      image-tag:
        required: false
        type: string
        default: ${{ github.sha }}

      registry:
        required: false
        type: string
        default: 'ghcr.io'
        # ghcr.io | docker.io | registry.azurecr.io | ecr

      # ── Herramienta de deploy ──────────────────────────────
      deploy-tool:
        required: false
        type: string
        default: 'helm'
        # helm | kubectl

      # ── Helm ──────────────────────────────────────────────
      helm-chart-path:
        required: false
        type: string
        default: './helm'

      helm-release-name:
        required: false
        type: string
        default: 'mi-app'

      helm-namespace:
        required: false
        type: string
        default: 'default'

      helm-values-file:
        required: false
        type: string
        default: ''
        # ejemplo: ./helm/values-production.yaml

      # ── Kubectl ───────────────────────────────────────────
      kubectl-manifest-path:
        required: false
        type: string
        default: './k8s'

      kubectl-namespace:
        required: false
        type: string
        default: 'default'

      # ── Artifact del CI ───────────────────────────────────
      artifact-name:
        required: false
        type: string
        default: ''

    secrets:
      KUBE_CONFIG:
        required: true        # kubeconfig en base64
      REGISTRY_USERNAME:
        required: false
      REGISTRY_PASSWORD:
        required: false

    outputs:
      deploy-url:
        description: "URL del despliegue"
        value: ${{ jobs.deploy.outputs.deploy-url }}


jobs:

  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}   # activa aprobacion manual en GitHub
    outputs:
      deploy-url: ${{ steps.get-url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      # ── Descargar artefacto del CI si existe ───────────────
      - name: Download artifact
        if: ${{ inputs.artifact-name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ./artifact

      # ── Login al registry ──────────────────────────────────
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # ── Build y push de la imagen Docker ──────────────────
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ inputs.image-name }}:${{ inputs.image-tag }}
            ${{ inputs.image-name }}:latest

      # ── Configurar kubectl ─────────────────────────────────
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      # ── Deploy con Helm ────────────────────────────────────
      - name: Setup Helm
        if: ${{ inputs.deploy-tool == 'helm' }}
        uses: azure/setup-helm@v3

      - name: Deploy with Helm
        if: ${{ inputs.deploy-tool == 'helm' }}
        run: |
          helm upgrade --install ${{ inputs.helm-release-name }} \
            ${{ inputs.helm-chart-path }} \
            --namespace ${{ inputs.helm-namespace }} \
            --create-namespace \
            --set image.repository=${{ inputs.image-name }} \
            --set image.tag=${{ inputs.image-tag }} \
            --set environment=${{ inputs.environment }} \
            ${{ inputs.helm-values-file != '' && format('--values {0}', inputs.helm-values-file) || '' }} \
            --wait \
            --timeout 5m

      # ── Deploy con Kubectl ─────────────────────────────────
      - name: Deploy with Kubectl
        if: ${{ inputs.deploy-tool == 'kubectl' }}
        run: |
          kubectl apply -f ${{ inputs.kubectl-manifest-path }} \
            --namespace ${{ inputs.kubectl-namespace }}

          kubectl set image deployment/* \
            app=${{ inputs.image-name }}:${{ inputs.image-tag }} \
            --namespace ${{ inputs.kubectl-namespace }}

          kubectl rollout status deployment \
            --namespace ${{ inputs.kubectl-namespace }} \
            --timeout=5m

      # ── Obtener URL del servicio ───────────────────────────
      - name: Get service URL
        id: get-url
        run: |
          URL=$(kubectl get svc ${{ inputs.helm-release-name }} \
            --namespace ${{ inputs.helm-namespace }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
          echo "url=${URL}" >> $GITHUB_OUTPUT

      # ── Rollback automatico si falla ───────────────────────
      - name: Rollback on failure
        if: ${{ failure() && inputs.deploy-tool == 'helm' }}
        run: |
          helm rollback ${{ inputs.helm-release-name }} \
            --namespace ${{ inputs.helm-namespace }}