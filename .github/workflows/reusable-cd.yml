name: Reusable Deploy - Kubernetes

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      runner:
        required: false
        type: string
        default: 'ubuntu-latest'      
      # ... resto de inputs
      helm-release-name:
        required: true
        type: string

      helm-namespace:
        required: false
        type: string
        default: 'default'

      helm-charts-repo:
        required: false
        type: string
        default: 'hakimsa/helm-releases'

      helm-charts-ref:
        required: false
        type: string
        default: 'main'

      image-name:
        required: false
        type: string
        default: ''

      image-tag:
        required: false
        type: string
        default: ''

      helm-values-file:
        required: false
        type: string
        default: ''

      deploy-tool:
        required: false
        type: string
        default: 'helm'

      kubectl-namespace:
        required: false
        type: string
        default: 'default'

      artifact-name:
        required: false
        type: string
        default: ''

    secrets:
      KUBE_CONFIG:
        required: true
      CHARTS_TOKEN:
        required: false

    outputs:
      deploy-url:
        description: "URL del despliegue"
        value: ${{ jobs.deploy.outputs.deploy-url }}

jobs:

  deploy:
    runs-on: ${{ inputs.runner }}
    environment: ${{ inputs.environment }}
    outputs:
      deploy-url: ${{ steps.get-url.outputs.url }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Checkout Helm releases repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.helm-charts-repo }}
          ref: ${{ inputs.helm-charts-ref }}
          token: ${{ secrets.CHARTS_TOKEN }} 
          path: ./helm-releases

      - name: Download artifact
        if: ${{ inputs.artifact-name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ./artifact

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Setup Helm
        if: ${{ inputs.deploy-tool == 'helm' }}
        uses: azure/setup-helm@v3
      - name: Debug helm-releases structure
        run: |
          echo "=== contenido raíz ==="
          ls -la ./helm-releases/
          echo "=== estructura completa ==="
          find ./helm-releases -type f
      - name: Deploy with Helm
        if: ${{ inputs.deploy-tool == 'helm' }}
        run: |
          helm upgrade --install ${{ inputs.helm-release-name }} \
            ./helm-releases \
            --namespace ${{ inputs.helm-namespace }} \
            --create-namespace \
            --values ./helm-releases/${{ inputs.helm-values-file != '' && inputs.helm-values-file || format('{0}/values.yaml', inputs.environment) }} \
            ${{ inputs.image-name != '' && format('--set image.repository={0}', inputs.image-name) || '' }} \
            ${{ inputs.image-tag != '' && format('--set image.tag={0}', inputs.image-tag) || '' }} \
            --wait \
            --timeout 5m

      - name: Deploy with Kubectl
        if: ${{ inputs.deploy-tool == 'kubectl' }}
        run: |
          kubectl apply -f ./helm-releases/${{ inputs.environment }}/ \
            --namespace ${{ inputs.kubectl-namespace }}
          kubectl rollout status deployment \
            --namespace ${{ inputs.kubectl-namespace }} \
            --timeout=5m

      - name: Get service URL
        id: get-url
        run: |
          URL=$(kubectl get svc ${{ inputs.helm-release-name }} \
            --namespace ${{ inputs.helm-namespace }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' \
            2>/dev/null || echo "pending")
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Rollback on failure
        if: ${{ failure() && inputs.deploy-tool == 'helm' }}
        run: |
          helm rollback ${{ inputs.helm-release-name }} \
            --namespace ${{ inputs.helm-namespace }}