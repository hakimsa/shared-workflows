name: Main CI/CD (Production)

on:
  push:
    branches: [main]
    tags:
      - 'v*'  # Releases

jobs:
  # Full CI/CD pipeline para production
  ci:
    uses: hakimsa/shared-workflows/.github/workflows/reusable-ci.yml@main
    with:
      # Build Configuration
      install-command: 'mvn clean install'
      build-command: 'mvn clean package'
      test-command: 'mvn test'
      lint-command: 'mvn checkstyle:check'
      
      # Environment
      setup-java: true
      java-version: '21'
      
      # Build y push de Docker a PRODUCTION
      docker-image-name: 'hakimsa/bakend-mgt'
      docker-registry: 'docker'
      dockerfile-path: 'Dockerfile'
      # En main usamos tags de versión
      image-tag: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
      environment: 'production'
      
    secrets:
      PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # Notificar resultado
  notify-production:
    needs: ci
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Production deployment completed
        if: success()
        run: |
          echo "## 🚀 Production Deployment Successful"
          echo ""
          echo "### Release Info"
          echo "- **Branch:** main"
          echo "- **Commit:** ${{ github.sha }}"
          echo "- **Tag:** ${{ github.ref_name }}"
          echo "- **Status:** ✅ SUCCESS"
          echo ""
          echo "### Production Image"
          echo "- **Image:** ${{ needs.ci.outputs.image-url }}"
          echo "- **Digest:** \`${{ needs.ci.outputs.image-digest }}\`"
          echo ""
          echo "### Action Required"
          echo "✅ Verify deployment in production environment"
          echo "✅ Run smoke tests"
          echo "✅ Monitor application health"

      - name: Production deployment failed
        if: failure()
        run: |
          echo "## ❌ Production Deployment Failed"
          echo ""
          echo "URGENT: Review logs and do not deploy!"
          echo "Branch: main"
          echo "Commit: ${{ github.sha }}"
          echo "Tag: ${{ github.ref_name }}"

  # Crear release note (si es tag)
  create-release:
    needs: ci
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            Production Release: ${{ github.ref_name }}
            
            **Image:** ${{ needs.ci.outputs.image-url }}
            **Digest:** ${{ needs.ci.outputs.image-digest }}
            
            For changelog, see commits since last release.
          draft: false
          prerelease: false
